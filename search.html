<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search PhishRadar</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        #output {
            margin-top: 20px;
            font-family: Arial, sans-serif;
        }
        .result {
            margin-bottom: 10px;
            padding: 10px;
            border: 1px solid #ddd;
        }
        .dimmed {
            opacity: 0.5; /* Adjust the value (0 to 1) to control how dim the text appears */
        }
</style>
    </style>
</head>
<body>
    <h1>Search PhishRadar</h1>
    <i>Ver: 0.15a</i> &nbsp; &nbsp;
    <!-- Search Box -->
    <input type="text" id="search-input" placeholder="Enter Keyword">
    <button id="search-btn">Search</button>

    <!-- Output -->
    <div id="output"></div>

    <script>
        let csvData = [];

        // Load the CSV file
        fetch('emailsenders.txt')
            .then(response => response.text())
            .then(csvText => {
                // Parse the CSV file using PapaParse, ignoring comments
                const parsedData = Papa.parse(csvText, {
                    header: true,
                    skipEmptyLines: true, // skip empty lines
                    beforeFirstChunk: function(chunk) {
                        // Filter out lines that start with '##' (comments)
                        const lines = chunk.split('\n').filter(line => !line.startsWith('##'));
                        return lines.join('\n');
                    }
                });

                // Store the parsed data
                csvData = parsedData.data;
            });

        // Function to search and display result
        function searchAndDisplay() {
            const searchInput = document.getElementById('search-input').value.toLowerCase();
            const outputDiv = document.getElementById('output');

            // Clear previous results
            outputDiv.innerHTML = '';

            // Filter the data based on the search input (substring match)
            const results = csvData.filter(row => 
                row.sender_email.toLowerCase().includes(searchInput) ||
                row.date_added.toLowerCase().includes(searchInput) ||
                row.reason.toLowerCase().includes(searchInput)
            );

            if (results.length > 0) {
                // Display the matching results
                results.forEach(row => {
                    const resultHtml = `
                        <div class="result">
                            <span class="dimmed">Sender Email: </span> <strong> ${row.sender_email} </strong> &nbsp; &nbsp; 
                            <span class="dimmed">Date Added: </span> <strong> ${row.date_added} </strong> &nbsp; &nbsp; 
                            <span class="dimmed">Reason: </span> <strong> ${row.reason} </strong>
                        </div>
                    `;
                    outputDiv.innerHTML += resultHtml;
                });
            } else {
                outputDiv.innerHTML = '<p>No results found.</p>';
            }
        }

        // Add event listener to search button
        document.getElementById('search-btn').addEventListener('click', searchAndDisplay);
    </script>
</body>
</html>
