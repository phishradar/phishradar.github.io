<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search PhishRadar</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        #output {
            margin-top: 20px;
            font-family: Arial, sans-serif;
        }
        .result {
            margin-bottom: 10px;
            padding: 10px;
            border: 1px solid #ddd;
        }
        .pagination {
            margin-top: 20px;
            font-size: 18px;
        }
        .pagination button {
            margin-right: 5px;
            padding: 5px 10px;
            cursor: pointer;
        .dimmed {
            opacity: 0.5;
        }
        a {
            text-decoration: none;
            color: blue;
        }
        a:hover {
            text-decoration: none;
            color: red;
        }
    </style>
</head>
<body>
    <a href="index.html"></a><h1><img src="img/profilepicture.jpg" width=60 height=60> PhishRadar </h1></a>
    <h1>Search PhishRadar</h1>
    <i>Ver: 0.37</i> &nbsp; &nbsp;
    <input type="text" id="search-input" size=50 placeholder="Enter keyword">
    <button id="search-btn">Search</button>
    <div id="output"></div>
    <div id="pagination" class="pagination"></div>
    <script>
        let csvData = [];
        let currentPage = 1;
        const resultsPerPage = 50;
        let filteredResults = [];
        function loadCSVFiles() {
            Promise.all([
                fetch('emailsenders.txt').then(response => response.text()),
                fetch('phishingurls.txt').then(response => response.text())
            ])
            .then(([csv1, csv2]) => {
                const parsedData1 = Papa.parse(csv1, {
                    header: true,
                    skipEmptyLines: true,
                    beforeFirstChunk: function(chunk) {
                        const lines = chunk.split('\n').filter(line => !line.startsWith('##'));
                        return lines.join('\n');
                    }
                });
                const parsedData2 = Papa.parse(csv2, {
                    header: true,
                    skipEmptyLines: true,
                    beforeFirstChunk: function(chunk) {
                        const lines = chunk.split('\n').filter(line => !line.startsWith('##'));
                        return lines.join('\n');
                    }
                });
                const normalizedData2 = parsedData2.data.map(row => ({
                    sender_email: row.sender_url,
                    date_added: row.date_added,
                    reason: row.reason
                }));
                csvData = [...parsedData1.data, ...normalizedData2];
                document.getElementById('search-btn').addEventListener('click', searchAndDisplay);
                document.getElementById('search-input').addEventListener('keypress', function(event) {
                    if (event.key === 'Enter') {
                        searchAndDisplay();
                    }
                });
            });
        }
        function searchAndDisplay() {
            const searchInput = document.getElementById('search-input').value.toLowerCase().trim();
            filteredResults = csvData.filter(row => {
                return (
                    (row.sender_email && row.sender_email.toLowerCase().includes(searchInput)) ||
                    (row.date_added && row.date_added.toLowerCase().includes(searchInput)) ||
                    (row.reason && row.reason.toLowerCase().includes(searchInput))
                );
            });
            currentPage = 1;
            displayResults();
            displayPaginationControls();
        }
        function displayResults() {
            const outputDiv = document.getElementById('output');
            outputDiv.innerHTML = '';
            if (filteredResults.length > 0) {
                const startIndex = (currentPage - 1) * resultsPerPage;
                const endIndex = startIndex + resultsPerPage;
                const paginatedResults = filteredResults.slice(startIndex, endIndex);
                paginatedResults.forEach(row => {
                    const resultHtml = `
                        <div class="result">
                            <span class="dimmed">Sender Email or URL: </span> <strong> ${row.sender_email} </strong> &nbsp;
                            <span class="dimmed">Date Added: </span> <strong> ${row.date_added} </strong> &nbsp;
                            <span class="dimmed">Reason: </span> <strong> ${row.reason} </strong>
                        </div>
                    `;
                    outputDiv.innerHTML += resultHtml;
                });
            } else {
                outputDiv.innerHTML = '<p>No results found.</p>';
            }
        }
        function displayPaginationControls() {
            const paginationDiv = document.getElementById('pagination');
            paginationDiv.innerHTML = '';
            const totalPages = Math.ceil(filteredResults.length / resultsPerPage);
            if (totalPages > 1) {
                for (let i = 1; i <= totalPages; i++) {
                    const pageButton = document.createElement('button');
                    pageButton.textContent = i;
                    if (i === currentPage) {
                        pageButton.style.fontWeight = 'bold';
                    }
                    pageButton.addEventListener('click', function() {
                        currentPage = i;
                        displayResults();
                        displayPaginationControls();
                    });
                    paginationDiv.appendChild(pageButton);
                }
            }
        }
        window.onload = loadCSVFiles;
    </script>
</body>
</html>
