<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Search</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        #output {
            margin-top: 20px;
            font-family: Arial, sans-serif;
        }
        .result {
            margin-bottom: 10px;
            padding: 10px;
            border: 1px solid #ddd;
        }
    </style>
</head>
<body>
    <h1>Search PhishRadar Database</h1>

    <!-- Search Box -->
    <input type="text" id="search-input" placeholder="Enter keyword">
    <button id="search-btn">Search</button>

    <!-- Output -->
    <div id="output"></div>

    <script>
        let csvData = [];

        // Load the CSV file
        fetch('emailsenders.txt')
            .then(response => response.text())
            .then(csvText => {
                // Remove comment lines before parsing
                const config = {
                    header: true,
                    beforeFirstChunk: function(chunk) {
                        // Split by newline and filter out lines that start with '##' or are empty
                        const lines = chunk.split('\n').filter(line => !line.startsWith('##') && line.trim() !== '');
                        return lines.join('\n');
                    }
                };

                // Parse the CSV file using PapaParse with the modified config
                const parsedData = Papa.parse(csvText, config);

                // Store the parsed data
                csvData = parsedData.data;
            });

        // Function to search and display result
        function searchAndDisplay() {
            const searchInput = document.getElementById('search-input').value.toLowerCase();
            const outputDiv = document.getElementById('output');

            // Clear previous results
            outputDiv.innerHTML = '';

            // Filter the data based on the search input
            //const result = csvData.filter(row => row.sender_email.toLowerCase() === searchInput);
            const results = csvData.filter(row => row.sender_email.toLowerCase().includes(searchInput));


            if (result.length > 0) {
                // Display the first matching result
                result.forEach(row => {
                    const resultHtml = `
                        <div class="result">
                            <p><strong>Sender Email :</strong> ${row.sender_email}</p>
                            <p><strong>Date Added   :</strong> ${row.date_added}</p>
                            <p><strong>Reason       :</strong> ${row.reason}</p>
                        </div>
                    `;
                    outputDiv.innerHTML += resultHtml;
                });
            } else {
                outputDiv.innerHTML = '<p>No results found.</p>';
            }
        }

        // Add event listener to search button
        document.getElementById('search-btn').addEventListener('click', searchAndDisplay);
    </script>
</body>
</html>
